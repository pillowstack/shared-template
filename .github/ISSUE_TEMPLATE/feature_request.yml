name: Feature request
description: Propose an improvement or new functionality
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your proposal. This project is in maintenance mode; small, non-disruptive improvements are prioritized.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Brief description of the solution, API, and examples
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
